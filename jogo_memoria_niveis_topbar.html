<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Memória em Níveis | Prof. Cristhiano Vasconcellos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <style>
    :root{--text:#0f172a;--soft:#475569;--muted:#64748b;--border:rgba(15,23,42,.09);--primary:#22c55e;--active:#15803d;--danger:#dc2626;--shadow:0 18px 40px rgba(15,23,42,.08);--sm:0 8px 24px rgba(15,23,42,.05);--radius:28px;--container:1180px;}
    *{box-sizing:border-box;margin:0;padding:0} body{font-family:Inter,system-ui,sans-serif;color:var(--text);min-height:100vh;background:radial-gradient(circle at 8% 8%,rgba(34,197,94,.12),transparent 26%),radial-gradient(circle at 92% 18%,rgba(14,165,233,.10),transparent 22%),linear-gradient(180deg,#fcfefe,#f8fafc 38%,#f4f8fb)}
    body:before{content:"";position:fixed;inset:0;background-image:linear-gradient(rgba(15,23,42,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(15,23,42,.03) 1px,transparent 1px);background-size:44px 44px;pointer-events:none;z-index:0} a{text-decoration:none;color:inherit} button,input{font:inherit}.page-wrap{padding:20px 0 36px;position:relative;z-index:1}.container{width:min(var(--container),calc(100% - 36px));margin:auto}.topbar{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;margin-bottom:14px}.back-link{display:inline-flex;align-items:center;gap:8px;color:var(--soft);font-weight:800}.score-row{display:flex;gap:10px;flex-wrap:wrap}.chip{display:inline-flex;align-items:center;gap:8px;padding:10px 14px;border-radius:999px;background:rgba(255,255,255,.88);border:1px solid var(--border);box-shadow:var(--sm);font-weight:900;color:var(--soft)}
    .hero{margin-bottom:16px}.hero h1,.start-card h1,.end-card h1{font-family:"Space Grotesk",sans-serif;letter-spacing:-.05em}.hero h1{font-size:clamp(2.1rem,4vw,3.5rem);line-height:1;margin-bottom:8px}.hero p,.screen-description,.start-card p,.end-card p{color:var(--soft);line-height:1.7}.progress-wrap{margin-bottom:18px;background:rgba(255,255,255,.86);border:1px solid var(--border);border-radius:20px;padding:14px 16px;box-shadow:var(--sm)}.progress-label{display:flex;justify-content:space-between;gap:12px;color:var(--muted);font-size:.9rem;font-weight:800;margin-bottom:8px}.progress{height:12px;background:#e2e8f0;border-radius:999px;overflow:hidden}.progress-bar{height:100%;background:linear-gradient(135deg,var(--primary),#34d399)}
    .start-screen,.end-screen{min-height:72vh;display:flex;align-items:center;justify-content:center}.start-card,.end-card,.game-card{background:rgba(255,255,255,.94);border:1px solid var(--border);box-shadow:var(--shadow);border-radius:var(--radius);padding:24px}.start-card,.end-card{width:min(860px,100%);text-align:center;overflow:hidden;position:relative}.start-icon,.end-icon{width:78px;height:78px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;background:rgba(34,197,94,.13);color:var(--active);font-size:2rem;margin-bottom:14px}.start-card h1,.end-card h1{font-size:clamp(2rem,4vw,3.1rem);line-height:1.02;margin-bottom:10px}.category-preview{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:20px 0}.category-card{background:rgba(255,255,255,.9);border:1px solid var(--border);border-radius:22px;padding:16px;box-shadow:var(--sm)}.category-card span{display:block;font-size:2.2rem}.category-card strong{display:block;margin-top:6px;font-family:"Space Grotesk",sans-serif}.btn{display:inline-flex;align-items:center;justify-content:center;gap:10px;border:0;cursor:pointer;border-radius:999px;padding:14px 22px;font-weight:900;transition:.2s}.btn:hover:not(:disabled){transform:translateY(-2px)}.btn-primary{background:linear-gradient(135deg,var(--primary),#34d399);color:#052e16;box-shadow:0 14px 28px rgba(34,197,94,.22)}.btn-secondary{background:white;color:var(--soft);border:1px solid var(--border);box-shadow:var(--sm)}.btn-danger{background:linear-gradient(135deg,#ef4444,#fb7185);color:white}.btn:disabled{opacity:.55;cursor:not-allowed;transform:none}.card-header{display:flex;justify-content:space-between;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:16px}.section-tag{display:inline-flex;align-items:center;gap:8px;background:rgba(34,197,94,.10);color:var(--active);border:1px solid rgba(34,197,94,.16);border-radius:999px;padding:10px 14px;font-weight:900}.level-pill{color:var(--muted);font-weight:900}.screen-title{font-family:"Space Grotesk",sans-serif;font-size:clamp(1.55rem,3vw,2.25rem);letter-spacing:-.04em;line-height:1.08;margin-bottom:10px}.hud{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:16px 0 18px}.hud-item{background:rgba(255,255,255,.84);border:1px solid var(--border);border-radius:20px;padding:14px;box-shadow:var(--sm)}.hud-item strong{display:block;font-family:"Space Grotesk";font-size:1.4rem;line-height:1;margin-bottom:5px}.hud-item span{font-size:.86rem;color:var(--muted);font-weight:800}.board-wrap{display:grid;grid-template-columns:1fr 300px;gap:18px;align-items:start}.board-panel,.tip-panel{background:rgba(255,255,255,.78);border:1px solid var(--border);border-radius:22px;box-shadow:var(--sm);padding:18px}.tip-panel{position:sticky;top:16px}.tip-panel h3{font-family:"Space Grotesk";margin-bottom:8px}.tip-panel p{color:var(--soft);line-height:1.65;margin-bottom:12px}.combo-box{padding:14px;border-radius:18px;background:linear-gradient(135deg,rgba(34,197,94,.1),rgba(14,165,233,.09));border:1px solid rgba(34,197,94,.16);font-weight:800;color:var(--soft);line-height:1.55}
    .board{display:grid;gap:12px;min-height:180px}.cols-4{grid-template-columns:repeat(4,minmax(66px,1fr))}.cols-5{grid-template-columns:repeat(5,minmax(62px,1fr))}.cols-6{grid-template-columns:repeat(6,minmax(58px,1fr))}.memory-card{aspect-ratio:1/1;min-height:82px;border:2px solid rgba(15,23,42,.10);border-radius:22px;background:linear-gradient(135deg,#0f172a,#1e293b);color:#86efac;box-shadow:0 12px 28px rgba(15,23,42,.16);font-size:clamp(2rem,5vw,4rem);font-weight:900;display:flex;align-items:center;justify-content:center;user-select:none;line-height:1}.memory-card::after{content:"?"}.memory-card.revealed,.memory-card.matched{background:linear-gradient(135deg,rgba(255,255,255,.98),rgba(236,253,245,.96));border-color:rgba(34,197,94,.28);color:var(--text);transform:rotateY(0deg)}.memory-card.revealed::after,.memory-card.matched::after{content:attr(data-emoji);filter:drop-shadow(0 8px 14px rgba(15,23,42,.13))}.memory-card.matched{background:linear-gradient(135deg,rgba(34,197,94,.22),rgba(187,247,208,.82));animation:pulse .55s ease}.memory-card.wrong{animation:shake .35s ease}@keyframes pulse{50%{transform:scale(1.05)}}@keyframes shake{25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}.feedback{min-height:34px;margin-top:14px;text-align:center;color:var(--soft);font-weight:800;line-height:1.55}.ok{color:var(--active);font-weight:900}.err{color:var(--danger);font-weight:900}.actions{margin-top:18px;display:flex;justify-content:center;gap:12px;flex-wrap:wrap}.name-field{width:min(500px,100%);border:1px solid var(--border);border-radius:999px;padding:15px 18px;font-size:1rem;outline:none;margin:6px 0 12px;box-shadow:var(--sm);background:white}.end-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}.end-stat{background:rgba(255,255,255,.84);border:1px solid var(--border);border-radius:20px;padding:16px}.end-stat strong{display:block;font-family:"Space Grotesk";font-size:1.6rem}.end-stat span{color:var(--muted);font-size:.9rem;font-weight:800}.microcopy{color:var(--muted);font-size:.9rem;text-align:center;margin-top:12px;line-height:1.6}.confetti{position:fixed;top:-10px;width:10px;height:10px;border-radius:3px;pointer-events:none;z-index:20;animation:fall 1s linear forwards}@keyframes fall{to{transform:translateY(105vh) rotate(720deg);opacity:0}}
    @media(max-width:960px){.board-wrap{grid-template-columns:1fr}.tip-panel{position:static}.hud{grid-template-columns:repeat(2,1fr)}.category-preview{grid-template-columns:repeat(2,1fr)}}@media(max-width:680px){.container{width:min(var(--container),calc(100% - 20px))}.start-card,.end-card,.game-card{padding:18px;border-radius:22px}.board-panel,.tip-panel{padding:12px}.board{gap:8px}.cols-5,.cols-6{grid-template-columns:repeat(4,minmax(54px,1fr))}.memory-card{border-radius:16px;min-height:68px}.end-stats{grid-template-columns:1fr 1fr}.hud{grid-template-columns:1fr 1fr}}
  </style>
</head>
<body>
  <main class="page-wrap"><div class="container" id="app"></div></main>
  <script>
    const URL_WEBAPP = "https://script.google.com/macros/s/AKfycbzoeygTm-R27yb8QOcdH0s7fViv6vGPQ5MtDuCgHBt3RhvFVQKlGxf3A7yQUR3RfRqFcw/exec";
    const NOME_ATIVIDADE = "Jogo da Memória em Níveis";
    const app=document.getElementById('app');
    const categorias={carinhas:{nome:'Carinhas',icone:'😀',texto:'expressões e emoções',pecas:['😀','😎','🤩','😴','🥳','🤖','👻','😇','🧐','😜','😱','🥰']},frutas:{nome:'Frutas',icone:'🍓',texto:'cores, formas e alimentos',pecas:['🍎','🍌','🍇','🍓','🍍','🥝','🍉','🍒','🍐','🍊','🥭','🫐']},objetos:{nome:'Objetos',icone:'🎒',texto:'materiais do cotidiano',pecas:['💡','📚','✏️','🎧','⌚','🔑','📱','🎮','🧲','🔔','📷','🖱️']},veiculos:{nome:'Veículos',icone:'🚗',texto:'transportes e movimento',pecas:['🚗','🚕','🚙','🚌','🚑','🚒','🚜','🚲','🏍️','🚀','✈️','🚢']}};
    const niveis=[{titulo:'Aquecimento das Carinhas',categoria:'carinhas',pares:4,cols:4,bonus:20,dica:'Comece observando posições próximas. O tabuleiro é pequeno para treinar a memória visual.'},{titulo:'Salada de Frutas',categoria:'frutas',pares:6,cols:4,bonus:30,dica:'Agora há mais cartas. Crie associações: frutas vermelhas, frutas amarelas e frutas grandes.'},{titulo:'Mesa de Objetos',categoria:'objetos',pares:8,cols:4,bonus:45,dica:'Use linha e coluna. Exemplo: lâmpada na segunda linha, primeira coluna.'},{titulo:'Garagem dos Veículos',categoria:'veiculos',pares:10,cols:5,bonus:60,dica:'O tabuleiro ficou maior. Evite clicar ao acaso; tente lembrar onde cada veículo apareceu.'},{titulo:'Misturão Final',categoria:'misto',pares:12,cols:6,bonus:90,dica:'Agora as categorias se misturam. Combine imagem, posição e família da peça.'}];
    let nivelAtual=0,cartas=[],primeira=null,segunda=null,travado=false,paresEncontrados=0,movimentos=0,pontos=0,erros=0,combo=0,melhorCombo=0,inicioNivel=null,segundosNivel=0,timerId=null,envioRealizado=false;
    function embaralhar(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
    function iniciar(){app.innerHTML=`<div class="topbar"><a class="back-link" href="objetos.html"><i class="fas fa-arrow-left"></i> Voltar aos objetos</a><div class="score-row"><div class="chip"><i class="fas fa-star"></i> Pontos: 0</div></div></div><section class="hero"><h1>Memória em Níveis</h1><p>Jogo da memória com categorias, níveis progressivos, pontuação, combo e registro final na planilha do professor.</p></section><section class="start-screen"><div class="start-card"><div class="start-icon"><i class="fas fa-brain"></i></div><h1>Memória em Níveis</h1><p>Encontre os pares, avance por tabuleiros cada vez maiores e acumule pontos. O jogo mistura carinhas, frutas, objetos e veículos para treinar atenção, concentração e memória visual.</p><div class="category-preview"><div class="category-card"><span>😀</span><strong>Carinhas</strong></div><div class="category-card"><span>🍓</span><strong>Frutas</strong></div><div class="category-card"><span>🎒</span><strong>Objetos</strong></div><div class="category-card"><span>🚗</span><strong>Veículos</strong></div></div><button class="btn btn-primary" onclick="carregarNivel(0)"><i class="fas fa-play"></i> Começar desafio</button><p class="microcopy">Pontuação: +10 por par, bônus por combo e bônus ao concluir cada nível. O nome será solicitado no final.</p></div></section>`}
    function montarCartasNivel(n){let pecas=n.categoria==='misto'?[...categorias.carinhas.pecas.slice(0,3),...categorias.frutas.pecas.slice(0,3),...categorias.objetos.pecas.slice(0,3),...categorias.veiculos.pecas.slice(0,3)]:categorias[n.categoria].pecas;const escolhidas=embaralhar([...pecas]).slice(0,n.pares);return embaralhar([...escolhidas,...escolhidas].map((emoji,i)=>({id:i+'-'+emoji,emoji,matched:false,revealed:false})))}
    function categoriaDoNivel(n){return n.categoria==='misto'?{nome:'Misturão',icone:'🎲',texto:'todas as categorias'}:categorias[n.categoria]}
    function carregarNivel(i){clearInterval(timerId);nivelAtual=i;const n=niveis[nivelAtual];cartas=montarCartasNivel(n);primeira=null;segunda=null;travado=false;paresEncontrados=0;movimentos=0;combo=0;segundosNivel=0;inicioNivel=Date.now();renderJogo();timerId=setInterval(()=>{segundosNivel=Math.floor((Date.now()-inicioNivel)/1000);const t=document.getElementById('tempoNivel');if(t)t.textContent=segundosNivel+'s'},1000)}
    function renderJogo(feedback='Escolha duas cartas para procurar um par.'){const n=niveis[nivelAtual],cat=categoriaDoNivel(n),percent=(nivelAtual/niveis.length)*100,total=n.pares*2;app.innerHTML=`<div class="topbar"><a class="back-link" href="objetos.html"><i class="fas fa-arrow-left"></i> Voltar aos objetos</a><div class="score-row"><div class="chip"><i class="fas fa-star"></i> Pontos: <span id="pontosTopo">${pontos}</span></div><div class="chip"><i class="fas fa-fire"></i> Combo: <span id="comboTopo">${combo}</span></div></div></div><section class="hero"><h1>Memória em Níveis</h1><p>Encontre os pares, avance de nível e registre sua pontuação ao final da atividade.</p></section><section class="progress-wrap"><div class="progress-label"><span>Nível ${nivelAtual+1} de ${niveis.length}</span><span>${Math.round(percent)}% do percurso concluído</span></div><div class="progress"><div class="progress-bar" style="width:${percent}%"></div></div></section><section class="game-card"><div class="card-header"><div class="section-tag"><span style="font-size:1.1rem">${cat.icone}</span> ${cat.nome} · ${cat.texto}</div><div class="level-pill">${total} cartas · ${n.pares} pares</div></div><h2 class="screen-title">${n.titulo}</h2><p class="screen-description">O tabuleiro cresce conforme você avança. Procure os pares iguais e tente manter o combo para ganhar mais pontos.</p><div class="hud"><div class="hud-item"><strong id="paresHUD">${paresEncontrados}/${n.pares}</strong><span>Pares encontrados</span></div><div class="hud-item"><strong id="movimentosHUD">${movimentos}</strong><span>Movimentos</span></div><div class="hud-item"><strong id="tempoNivel">${segundosNivel}s</strong><span>Tempo no nível</span></div><div class="hud-item"><strong id="errosHUD">${erros}</strong><span>Erros totais</span></div></div><div class="board-wrap"><div class="board-panel"><div id="board" class="board cols-${n.cols}">${cartas.map((c,i)=>`<button type="button" class="memory-card ${c.revealed?'revealed':''} ${c.matched?'matched':''}" data-index="${i}" data-emoji="${c.emoji}" onclick="virarCarta(${i})" ${c.matched?'disabled':''} aria-label="Carta de memória"></button>`).join('')}</div><div id="feedback" class="feedback">${feedback}</div><div class="actions"><button class="btn btn-secondary" onclick="reiniciarNivel()"><i class="fas fa-rotate-right"></i> Reiniciar nível</button><button class="btn btn-danger" onclick="mostrarTelaNome()"><i class="fas fa-flag-checkered"></i> Finalizar</button></div></div><aside class="tip-panel"><h3><i class="fas fa-lightbulb"></i> Dica do nível</h3><p>${n.dica}</p><div class="combo-box"><i class="fas fa-fire"></i> Combo ativo: ${combo}<br>Acertar em sequência dá pontos extras. Errar zera o combo, mas faz parte do treino.</div></aside></div></section>`}
    function atualizarHUD(){const n=niveis[nivelAtual];[['paresHUD',`${paresEncontrados}/${n.pares}`],['movimentosHUD',movimentos],['errosHUD',erros],['pontosTopo',pontos],['comboTopo',combo]].forEach(([id,v])=>{const e=document.getElementById(id);if(e)e.textContent=v})}
    function virarCarta(index){if(travado)return;const carta=cartas[index];if(!carta||carta.revealed||carta.matched)return;carta.revealed=true;const btn=document.querySelector(`[data-index="${index}"]`);if(btn)btn.classList.add('revealed');if(primeira===null){primeira=index;document.getElementById('feedback').innerHTML='Ótimo. Agora escolha a segunda carta.';return}segunda=index;movimentos++;travado=true;const c1=cartas[primeira],c2=cartas[segunda];atualizarHUD();setTimeout(()=>c1.emoji===c2.emoji?acertouPar():errouPar(),c1.emoji===c2.emoji?320:760)}
    function acertouPar(){const n=niveis[nivelAtual];cartas[primeira].matched=true;cartas[segunda].matched=true;paresEncontrados++;combo++;melhorCombo=Math.max(melhorCombo,combo);const ganho=10+(combo*3);pontos+=ganho;[primeira,segunda].forEach(i=>{const b=document.querySelector(`[data-index="${i}"]`);if(b){b.classList.add('matched');b.disabled=true}});soltarConfetes(12);document.getElementById('feedback').innerHTML=`<span class="ok">✔ Par encontrado!</span> +${ganho} pontos. Combo ${combo}!`;limparSelecao();atualizarHUD();if(paresEncontrados===n.pares)concluirNivel()}
    function errouPar(){erros++;combo=0;const a=primeira,b=segunda;[a,b].forEach(i=>{const el=document.querySelector(`[data-index="${i}"]`);if(el)el.classList.add('wrong')});setTimeout(()=>{[a,b].forEach(i=>{const el=document.querySelector(`[data-index="${i}"]`);if(el)el.classList.remove('revealed','wrong');if(cartas[i])cartas[i].revealed=false});document.getElementById('feedback').innerHTML='<span class="err">✖ Não era par.</span> Tente lembrar a posição dessas duas peças.';limparSelecao();atualizarHUD()},360)}
    function limparSelecao(){primeira=null;segunda=null;travado=false}
    function concluirNivel(){clearInterval(timerId);const n=niveis[nivelAtual];const bonusTempo=Math.max(0,n.bonus-Math.floor(segundosNivel/3));const bonusMov=Math.max(0,(n.pares*3)-movimentos);const bonus=n.bonus+bonusTempo+bonusMov;pontos+=bonus;atualizarHUD();soltarConfetes(36);setTimeout(()=>{const ultimo=nivelAtual===niveis.length-1;app.innerHTML=`<section class="end-screen"><div class="end-card"><div class="end-icon"><i class="fas fa-trophy"></i></div><h1>${ultimo?'Todos os níveis concluídos!':'Nível concluído!'}</h1><p>Você completou <strong>${n.titulo}</strong> e recebeu bônus de conclusão.</p><div class="end-stats"><div class="end-stat"><strong>${pontos}</strong><span>Pontos totais</span></div><div class="end-stat"><strong>+${bonus}</strong><span>Bônus do nível</span></div><div class="end-stat"><strong>${movimentos}</strong><span>Movimentos</span></div><div class="end-stat"><strong>${segundosNivel}s</strong><span>Tempo</span></div></div><div class="actions">${ultimo?`<button class="btn btn-primary" onclick="mostrarTelaNome()"><i class="fas fa-paper-plane"></i> Registrar resultado</button>`:`<button class="btn btn-primary" onclick="carregarNivel(${nivelAtual+1})"><i class="fas fa-arrow-right"></i> Próximo nível</button>`}<button class="btn btn-secondary" onclick="carregarNivel(${nivelAtual})"><i class="fas fa-rotate-right"></i> Jogar este nível novamente</button></div></div></section>`},900)}
    function reiniciarNivel(){carregarNivel(nivelAtual)}
    function mostrarTelaNome(){clearInterval(timerId);app.innerHTML=`<section class="end-screen"><div class="end-card"><div class="end-icon"><i class="fas fa-user-check"></i></div><h1>Registrar pontuação</h1><p>Digite seu nome completo para enviar o resultado para a planilha do professor.</p><input id="nomeAluno" class="name-field" type="text" placeholder="Digite seu nome completo" /><div class="end-stats"><div class="end-stat"><strong>${pontos}</strong><span>Pontos</span></div><div class="end-stat"><strong>${nivelAtual+1}</strong><span>Nível alcançado</span></div><div class="end-stat"><strong>${erros}</strong><span>Erros</span></div><div class="end-stat"><strong>${melhorCombo}</strong><span>Melhor combo</span></div></div><button class="btn btn-primary" onclick="finalizarEnviar()"><i class="fas fa-paper-plane"></i> Enviar resultado</button><p class="microcopy" id="statusEnvio">O envio registra nome, atividade, pontos, nível alcançado e erros.</p></div></section>`}
    async function registrarResultado(nome,atividade,acertos,total,erros){await fetch(URL_WEBAPP,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify({nome,atividade,acertos,total,erros})})}
    async function finalizarEnviar(){if(envioRealizado)return;const campo=document.getElementById('nomeAluno'),status=document.getElementById('statusEnvio'),nome=campo.value.trim();if(!nome){status.innerHTML='Digite seu nome completo antes de enviar.';status.style.color='#dc2626';campo.focus();return}envioRealizado=true;status.innerHTML='Enviando resultado...';try{await registrarResultado(nome,NOME_ATIVIDADE,pontos,niveis.length,erros);mostrarFinal()}catch(e){console.error(e);mostrarFinal()}}
    function mostrarFinal(){soltarConfetes(42);app.innerHTML=`<section class="end-screen"><div class="end-card"><div class="end-icon"><i class="fas fa-brain"></i></div><h1>Resultado registrado!</h1><p>Parabéns! Você treinou memória visual, atenção e estratégia avançando por tabuleiros com dificuldade progressiva.</p><div class="end-stats"><div class="end-stat"><strong>${pontos}</strong><span>Pontos</span></div><div class="end-stat"><strong>${nivelAtual+1}</strong><span>Nível alcançado</span></div><div class="end-stat"><strong>${erros}</strong><span>Erros</span></div><div class="end-stat"><strong>${melhorCombo}</strong><span>Melhor combo</span></div></div><div class="actions"><a class="btn btn-primary" href="objetos.html"><i class="fas fa-cubes"></i> Explorar objetos</a><a class="btn btn-secondary" href="index.html"><i class="fas fa-home"></i> Voltar ao início</a></div></div></section>`}
    function soltarConfetes(qtd){const cores=['#22c55e','#38bdf8','#f59e0b','#8b5cf6','#ef4444'];for(let i=0;i<qtd;i++){const c=document.createElement('span');c.className='confetti';c.style.left=Math.random()*100+'vw';c.style.background=cores[Math.floor(Math.random()*cores.length)];c.style.animationDuration=800+Math.random()*900+'ms';document.body.appendChild(c);setTimeout(()=>c.remove(),1800)}}
    iniciar();
  </script>
